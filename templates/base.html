<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการร้านอาหาร</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap">
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background: linear-gradient(to right, #f8f9fa, #e9ecef);
        }
        .swal2-popup {
            font-family: 'Prompt', sans-serif;
        }
        .nav-item {
            transition: all 0.3s ease;
        }
        .nav-item:hover {
            transform: translateX(8px);
            background: linear-gradient(to right, #e3f2fd, transparent);
        }
        .card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.1);
        }
        .btn-primary {
            background: linear-gradient(45deg, #4f46e5, #6366f1);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }
        
        /* เพิ่ม styles สำหรับ sidebar */
        @media (min-width: 1024px) {
            .sidebar {
                transform: none !important;
                visibility: visible !important;
            }
            .main-content {
                margin-left: 16rem;
            }
        }
        
        .sidebar {
            width: 16rem;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 50;
            transition: transform 0.3s ease-in-out;
        }
        
        .sidebar-hidden {
            transform: translateX(-100%);
        }
    </style>
    <script>
        function showLoading() {
            document.getElementById('loading-screen').style.display = 'flex';
        }

        function hideLoading() {
            document.getElementById('loading-screen').style.display = 'none';
        }

        // เพิ่ม event listener สำหรับทุกลิงก์ในเว็บไซต์
        document.addEventListener('DOMContentLoaded', function() {
            const links = document.querySelectorAll('a:not([target="_blank"])');
            links.forEach(link => {
                link.addEventListener('click', function(e) {
                    if (!e.ctrlKey && !e.shiftKey && !e.metaKey) {
                        showLoading();
                    }
                });
            });

            // สำหรับฟอร์ม
            const forms = document.querySelectorAll('form');
            forms.forEach(form => {
                form.addEventListener('submit', function() {
                    showLoading();
                });
            });
        });

        // ซ่อนหน้าโหลดเมื่อโหลดหน้าเสร็จ
        window.addEventListener('load', hideLoading);
    </script>
</head>
<body class="min-h-screen bg-gray-50">
    {% include 'loading.html' %}
    <div x-data="{ isSidebarOpen: true }">
        <!-- Sidebar -->
        <aside class="sidebar bg-white shadow-lg"
               :class="{ 'sidebar-hidden': !isSidebarOpen }">
            <div class="flex items-center justify-between h-16 px-6 border-b bg-gradient-to-r from-blue-600 to-indigo-600">
                <a href="/" class="text-xl font-bold text-white">ร้านอาหาร</a>
                <button @click="isSidebarOpen = false" class="lg:hidden text-white">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            
            <nav class="px-4 py-6 space-y-2">
                <a href="/menu" class="nav-item flex items-center px-4 py-3 text-gray-700 rounded-lg group hover:bg-gray-50">
                    <svg class="w-5 h-5 mr-3 text-gray-500 group-hover:text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                    </svg>
                    <span class="group-hover:text-blue-600">เมนูอาหาร</span>
                </a>
                <a href="/order" class="nav-item flex items-center px-4 py-3 text-gray-700 rounded-lg group hover:bg-gray-50">
                    <svg class="w-5 h-5 mr-3 text-gray-500 group-hover:text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
                    </svg>
                    <span class="group-hover:text-blue-600">สั่งอาหาร</span>
                </a>
                <a href="/orders" class="nav-item flex items-center px-4 py-3 text-gray-700 rounded-lg group hover:bg-gray-50">
                    <svg class="w-5 h-5 mr-3 text-gray-500 group-hover:text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                    </svg>
                    <span class="group-hover:text-blue-600">รายการสั่ง</span>
                </a>
                <a href="/reservations" class="nav-item flex items-center px-4 py-3 text-gray-700 rounded-lg group hover:bg-gray-50">
                    <svg class="w-5 h-5 mr-3 text-gray-500 group-hover:text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                    <span class="group-hover:text-blue-600">จองโต๊ะ</span>
                </a>
                <a href="/analytics" class="nav-item flex items-center px-4 py-3 text-gray-700 rounded-lg group hover:bg-gray-50">
                    <svg class="w-5 h-5 mr-3 text-gray-500 group-hover:text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                    </svg>
                    <span class="group-hover:text-blue-600">รายงาน</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Top Bar -->
            <div class="sticky top-0 z-10 bg-white/80 backdrop-blur-sm border-b shadow-sm">
                <div class="flex items-center justify-between h-16 px-6">
                    <button @click="isSidebarOpen = !isSidebarOpen" class="lg:hidden">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                        </svg>
                    </button>
                    <div class="flex items-center space-x-4">
                        <span id="current-time" class="text-sm text-gray-500"></span>
                        <span class="text-sm text-gray-500">|</span>
                        <span id="current-date" class="text-sm text-gray-500"></span>
                    </div>
                   
                </div>
            </div>

            <!-- Page Content -->
            <main class="p-6">
                <div class="max-w-7xl mx-auto">
                    {% with messages = get_flashed_messages() %}
                        {% if messages %}
                            {% for message in messages %}
                                <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mb-8">
                                    <div class="bg-green-50 border-l-4 border-green-400 p-4">
                                        <div class="flex">
                                            <div class="flex-shrink-0">
                                                <svg class="h-5 w-5 text-green-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                                                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
                                                </svg>
                                            </div>
                                            <div class="ml-3">
                                                <p class="text-sm text-green-700">
                                                    {{ message }}
                                                </p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            {% endfor %}
                        {% endif %}
                    {% endwith %}

                    {% block content %}{% endblock %}
                </div>
            </main>
        </div>
    </div>

    <script>
    // Real-time clock and date
    function updateDateTime() {
        const now = new Date();
        const timeOptions = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
        const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        
        document.getElementById('current-time').textContent = now.toLocaleTimeString('th-TH', timeOptions);
        document.getElementById('current-date').textContent = now.toLocaleDateString('th-TH', dateOptions);
    }
    
    updateDateTime();
    setInterval(updateDateTime, 1000);

    // Page transition effect
    document.addEventListener('DOMContentLoaded', () => {
        document.body.style.opacity = '0';
        setTimeout(() => {
            document.body.style.transition = 'opacity 0.5s ease';
            document.body.style.opacity = '1';
        }, 0);
    });
    </script>
</body>
</html>
