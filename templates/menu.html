{% extends "base.html" %}

{% block content %}
<div class="max-w-6xl mx-auto">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-3xl font-bold">เมนูอาหาร</h1>
        <a href="{{ url_for('add_menu_item') }}" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">
            เพิ่มเมนู
        </a>
    </div>
    
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        {% for menu_item in menu_items %}
        <div class="bg-white rounded-lg shadow-md overflow-hidden">
            {% if menu_item.image_url %}
            <img src="{{ menu_item.image_url }}" alt="{{ menu_item.name }}" class="w-full h-48 object-cover">
            {% endif %}
            <div class="p-4">
                <h3 class="text-xl font-semibold mb-2">{{ menu_item.name }}</h3>
                <p class="text-gray-600 mb-2">{{ menu_item.category }}</p>
                <p class="text-lg font-bold text-blue-600">฿{{ menu_item.price }}</p>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
