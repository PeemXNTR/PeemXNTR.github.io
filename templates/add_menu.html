<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เพิ่มเมนูอาหาร - CWNK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 font-[Prompt]">
    {% include 'base.html' %}
    
    <div class="max-w-2xl mx-auto py-8 px-4">
        <h1 class="text-2xl font-bold text-center mb-8">เพิ่มเมนูอาหาร</h1>
        
        <form action="{{ url_for('add_menu') }}" method="POST" class="space-y-6 bg-white p-6 rounded-lg shadow">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">ชื่อเมนู</label>
                <input type="text" name="name" required
                       class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-yellow-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">หมวดหมู่</label>
                <select name="category" required
                        class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-yellow-500">
                    <option value="อาหารจานเดียว">อาหารจานเดียว</option>
                    <option value="กับข้าว">กับข้าว</option>
                    <option value="เครื่องดื่ม">เครื่องดื่ม</option>
                    <option value="ของหวาน">ของหวาน</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">ราคา (บาท)</label>
                <input type="number" name="price" required min="0"
                       class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-yellow-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">URL รูปภาพ</label>
                <input type="url" name="image_url" required
                       class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-yellow-500"
                       placeholder="https://example.com/image.jpg">
            </div>

            <div class="flex justify-end space-x-4">
                <a href="{{ url_for('menu') }}" 
                   class="px-4 py-2 text-gray-700 bg-gray-100 rounded-md hover:bg-gray-200">
                    ยกเลิก
                </a>
                <button type="submit" 
                        class="px-4 py-2 bg-yellow-500 text-white rounded-md hover:bg-yellow-600">
                    บันทึก
                </button>
            </div>
        </form>
    </div>
</body>
</html>
