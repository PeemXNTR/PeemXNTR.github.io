{% extends "base.html" %}

{% block content %}
<div class="max-w-4xl mx-auto" x-data="{ items: [] }">
    <h1 class="text-3xl font-bold mb-6">สั่งอาหาร</h1>
    <form method="POST" class="bg-white shadow-md rounded px-8 pt-6 pb-8 mb-4">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2" for="customer_name">
                    ชื่อลูกค้า
                </label>
                <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"
                       id="customer_name" name="customer_name" type="text" required>
            </div>
            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2" for="table_number">
                    โต๊ะที่
                </label>
                <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"
                       id="table_number" name="table_number" type="number" required>
            </div>
        </div>

        <!-- แสดงรายการอาหารแบบการ์ด -->
        <div class="mb-6">
            <h2 class="text-xl font-semibold mb-4">เลือกรายการอาหาร</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                {% for item in menu_items %}
                <div class="border rounded-lg p-4 hover:shadow-lg transition">
                    {% if item.image_url %}
                    <img src="{{ item.image_url }}" alt="{{ item.name }}" class="w-full h-40 object-cover rounded-lg mb-2">
                    {% else %}
                    <div class="w-full h-40 bg-gray-200 flex items-center justify-center rounded-lg mb-2">
                        <span class="text-gray-400">ไม่มีรูปภาพ</span>
                    </div>
                    {% endif %}
                    <h3 class="font-semibold">{{ item.name }}</h3>
                    <p class="text-gray-600">{{ item.category }}</p>
                    <p class="text-blue-600 font-bold">{{ "%.2f"|format(item.price) }} บาท</p>
                    <div class="mt-2 flex items-center space-x-2">
                        <input type="checkbox" name="items[]" value="{{ item.id }}" class="menu-item-checkbox">
                        <input type="number" name="quantities[]" value="1" min="1" 
                               class="w-20 border rounded py-1 px-2" disabled>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>

        <div class="flex items-center justify-between">
            <button class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline"
                    type="submit" id="submit-order">
                บันทึกออเดอร์
            </button>
        </div>
    </form>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const checkboxes = document.querySelectorAll('.menu-item-checkbox');
    checkboxes.forEach(checkbox => {
        checkbox.addEventListener('change', function() {
            const quantityInput = this.parentElement.querySelector('input[type="number"]');
            quantityInput.disabled = !this.checked;
            if (!this.checked) {
                quantityInput.value = 1;
            }
        });
    });
});
</script>
{% endblock %}
